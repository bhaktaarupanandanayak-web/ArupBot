<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arup AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            light: '#f0f4f9',
                            dark: '#1e1f22',
                            sidebar: '#e3e3e3',
                            sidebarDark: '#2b2d31',
                            blue: '#1a73e8',
                            darkBlue: '#8ab4f8'
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Fallback Loader Styles */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #333333;
            font-family: sans-serif;
            font-size: 1.25rem;
            z-index: 9999;
        }
        @media (prefers-color-scheme: dark) {
            #loading {
                background-color: #111827;
                color: #f3f4f6;
            }
        }

        /* Markdown Prose Styling */
        .prose pre {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        .prose code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background-color: rgba(156, 163, 175, 0.2);
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
        }
        .prose pre code {
            background-color: transparent;
            padding: 0;
        }
        .prose p { margin-bottom: 0.75rem; }
        .prose p:last-child { margin-bottom: 0; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .prose h1, .prose h2, .prose h3 { font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Utility */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-200">

    <div id="loading">Loading Arup AI...</div>

    <div id="app" class="hidden flex min-h-[100dvh] w-full relative overflow-hidden">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden"></div>

        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-30 w-72 bg-gemini-light dark:bg-gemini-sidebarDark transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col border-r border-gray-200 dark:border-gray-700">
            <div class="p-4 flex items-center justify-between">
                <h1 class="text-xl font-bold tracking-tight">Arup AI</h1>
                <button id="close-sidebar-btn" class="lg:hidden p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="px-4 pb-2">
                <button id="new-chat-btn" class="w-full flex items-center gap-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm font-medium py-2.5 px-4 rounded-full transition-colors shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-1" id="chat-list">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-2">
                <button id="theme-toggle" class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white w-full p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <svg id="theme-icon-dark" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg id="theme-icon-light" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span id="theme-text">Toggle Theme</span>
                </button>
                <button id="settings-btn" class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white w-full p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 relative bg-white dark:bg-gemini-dark h-[100dvh]">
            
            <header class="flex items-center justify-between p-3 border-b border-gray-200 dark:border-gray-800 lg:hidden bg-white dark:bg-gemini-dark z-10">
                <button id="open-sidebar-btn" class="p-2 -ml-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h2 id="mobile-chat-title" class="text-sm font-semibold truncate flex-1 text-center px-4">New Chat</h2>
                <div class="w-10"></div> </header>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 sm:p-6 pb-32 sm:pb-36 scroll-smooth">
                <div id="messages-list" class="max-w-3xl mx-auto flex flex-col gap-6">
                    <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center mt-20">
                        <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-gemini-blue dark:text-gemini-darkBlue rounded-full flex items-center justify-center mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <h2 class="text-2xl font-semibold mb-2">How can I help you today?</h2>
                        <p class="text-gray-500 dark:text-gray-400 text-sm">Enter a message below to start chatting.</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-dark dark:via-gemini-dark pt-6 pb-4 px-4 sm:px-6 z-10">
                <div class="max-w-3xl mx-auto relative">
                    <form id="chat-form" class="relative flex items-end shadow-lg dark:shadow-none border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-2xl overflow-hidden focus-within:ring-2 focus-within:ring-gemini-blue transition-shadow">
                        <textarea 
                            id="message-input" 
                            class="w-full max-h-48 min-h-[56px] py-4 pl-4 pr-12 bg-transparent resize-none hide-scrollbar outline-none text-gray-800 dark:text-gray-100 placeholder-gray-500" 
                            placeholder="Message Arup AI..."
                            rows="1"
                        ></textarea>
                        <button type="submit" id="send-btn" class="absolute right-2 bottom-2 p-2 rounded-xl bg-gemini-blue text-white hover:bg-blue-600 disabled:opacity-50 disabled:hover:bg-gemini-blue transition-colors flex items-center justify-center" disabled>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </form>
                    <div class="text-center mt-2 text-xs text-gray-400 dark:text-gray-500">
                        Arup AI can make mistakes. Consider verifying important information.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-2xl shadow-xl overflow-hidden transform transition-all">
            <div class="flex justify-between items-center p-5 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-lg font-semibold">Settings</h3>
                <button id="close-settings-btn" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-transparent focus:ring-2 focus:ring-gemini-blue outline-none" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="model-input" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-transparent focus:ring-2 focus:ring-gemini-blue outline-none" placeholder="deepseek/deepseek-r1:free" value="deepseek/deepseek-r1:free">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-transparent focus:ring-2 focus:ring-gemini-blue outline-none resize-none h-24" placeholder="You are a helpful assistant."></textarea>
                </div>
            </div>
            <div class="p-5 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-2 bg-gray-50 dark:bg-gray-800/50">
                <button id="cancel-settings-btn" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Cancel</button>
                <button id="save-settings-btn" class="px-4 py-2 rounded-lg text-sm font-medium bg-gemini-blue text-white hover:bg-blue-600 transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- State Management ---
            let chats = JSON.parse(localStorage.getItem('arup_chats')) || [];
            let currentChatId = null;
            let settings = JSON.parse(localStorage.getItem('arup_settings')) || {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are Arup AI, a helpful, respectful, and honest assistant.',
                theme: 'system' // 'light', 'dark', 'system'
            };
            let isGenerating = false;
            let abortController = null;

            // --- DOM Elements ---
            const els = {
                app: document.getElementById('app'),
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                openSidebarBtn: document.getElementById('open-sidebar-btn'),
                closeSidebarBtn: document.getElementById('close-sidebar-btn'),
                chatList: document.getElementById('chat-list'),
                newChatBtn: document.getElementById('new-chat-btn'),
                themeToggle: document.getElementById('theme-toggle'),
                themeIconLight: document.getElementById('theme-icon-light'),
                themeIconDark: document.getElementById('theme-icon-dark'),
                themeText: document.getElementById('theme-text'),
                settingsBtn: document.getElementById('settings-btn'),
                settingsModal: document.getElementById('settings-modal'),
                closeSettingsBtn: document.getElementById('close-settings-btn'),
                cancelSettingsBtn: document.getElementById('cancel-settings-btn'),
                saveSettingsBtn: document.getElementById('save-settings-btn'),
                apiKeyInput: document.getElementById('api-key-input'),
                modelInput: document.getElementById('model-input'),
                systemPromptInput: document.getElementById('system-prompt-input'),
                messagesContainer: document.getElementById('messages-container'),
                messagesList: document.getElementById('messages-list'),
                emptyState: document.getElementById('empty-state'),
                chatForm: document.getElementById('chat-form'),
                messageInput: document.getElementById('message-input'),
                sendBtn: document.getElementById('send-btn'),
                mobileChatTitle: document.getElementById('mobile-chat-title')
            };

            // --- Initialization ---
            function init() {
                // Configure Marked.js
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });

                applyTheme(settings.theme);
                renderChatList();
                
                if (chats.length > 0) {
                    loadChat(chats[0].id);
                } else {
                    createNewChat();
                }

                setupEventListeners();

                // Hide loader, show app
                els.loading.style.display = 'none';
                els.app.classList.remove('hidden');
            }

            // --- Theme Handling ---
            function applyTheme(theme) {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = theme === 'dark' || (theme === 'system' && prefersDark);
                
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    els.themeIconLight.classList.add('hidden');
                    els.themeIconDark.classList.remove('hidden');
                    els.themeText.textContent = 'Light Mode';
                } else {
                    document.documentElement.classList.remove('dark');
                    els.themeIconLight.classList.remove('hidden');
                    els.themeIconDark.classList.add('hidden');
                    els.themeText.textContent = 'Dark Mode';
                }
            }

            function toggleTheme() {
                const currentIsDark = document.documentElement.classList.contains('dark');
                settings.theme = currentIsDark ? 'light' : 'dark';
                saveSettings();
                applyTheme(settings.theme);
            }

            // --- Data Persistence ---
            function saveChats() {
                localStorage.setItem('arup_chats', JSON.stringify(chats));
            }

            function saveSettings() {
                localStorage.setItem('arup_settings', JSON.stringify(settings));
            }

            // --- Chat Management ---
            function createNewChat() {
                if (isGenerating) return;
                const newId = Date.now().toString();
                const newChat = {
                    id: newId,
                    title: 'New Chat',
                    messages: []
                };
                chats.unshift(newChat);
                saveChats();
                renderChatList();
                loadChat(newId);
                closeSidebarMobile();
            }

            function loadChat(id) {
                if (isGenerating) return;
                currentChatId = id;
                const chat = chats.find(c => c.id === id);
                if (!chat) return;

                els.mobileChatTitle.textContent = chat.title;
                renderMessages(chat.messages);
                updateActiveChatStyle();
                closeSidebarMobile();
            }

            function deleteChat(id, event) {
                event.stopPropagation();
                if (isGenerating) return;
                if (!confirm('Are you sure you want to delete this chat?')) return;
                
                chats = chats.filter(c => c.id !== id);
                saveChats();
                
                if (chats.length === 0) {
                    createNewChat();
                } else if (currentChatId === id) {
                    loadChat(chats[0].id);
                } else {
                    renderChatList();
                }
            }

            function renameChat(id, event) {
                event.stopPropagation();
                const chat = chats.find(c => c.id === id);
                const newTitle = prompt('Enter new chat name:', chat.title);
                if (newTitle && newTitle.trim() !== '') {
                    chat.title = newTitle.trim();
                    saveChats();
                    renderChatList();
                    if (currentChatId === id) els.mobileChatTitle.textContent = chat.title;
                }
            }

            // --- UI Rendering ---
            function renderChatList() {
                els.chatList.innerHTML = '';
                chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors ${chat.id === currentChatId ? 'bg-gray-200 dark:bg-gray-700' : 'hover:bg-gray-100 dark:hover:bg-gray-800'}`;
                    div.onclick = () => loadChat(chat.id);
                    
                    div.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden flex-1">
                            <svg class="w-4 h-4 text-gray-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                            <span class="text-sm truncate text-gray-700 dark:text-gray-200">${escapeHTML(chat.title)}</span>
                        </div>
                        <div class="hidden group-hover:flex items-center gap-1 pl-2">
                            <button class="p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200" title="Rename" onclick="renameChatHelper('${chat.id}', event)">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button class="p-1 text-gray-400 hover:text-red-500" title="Delete" onclick="deleteChatHelper('${chat.id}', event)">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                    els.chatList.appendChild(div);
                });
            }

            // Expose helpers to global scope for inline handlers
            window.renameChatHelper = renameChat;
            window.deleteChatHelper = deleteChat;

            function updateActiveChatStyle() {
                Array.from(els.chatList.children).forEach((child, index) => {
                    const chat = chats[index];
                    if (chat.id === currentChatId) {
                        child.classList.add('bg-gray-200', 'dark:bg-gray-700');
                        child.classList.remove('hover:bg-gray-100', 'dark:hover:bg-gray-800');
                    } else {
                        child.classList.remove('bg-gray-200', 'dark:bg-gray-700');
                        child.classList.add('hover:bg-gray-100', 'dark:hover:bg-gray-800');
                    }
                });
            }

            function renderMessages(messages) {
                els.messagesList.innerHTML = '';
                if (messages.length === 0) {
                    els.messagesList.appendChild(els.emptyState);
                    els.emptyState.style.display = 'flex';
                    return;
                }
                
                els.emptyState.style.display = 'none';
                messages.forEach(msg => appendMessageUI(msg.role, msg.content));
                scrollToBottom();
            }

            function appendMessageUI(role, content) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
                
                const innerClass = role === 'user' 
                    ? 'bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-100 rounded-2xl rounded-tr-sm px-5 py-3 max-w-[85%] whitespace-pre-wrap'
                    : 'prose dark:prose-invert max-w-full w-full text-gray-800 dark:text-gray-100';

                const avatar = role === 'assistant' 
                    ? `<div class="w-8 h-8 rounded-full bg-gemini-blue flex-shrink-0 flex items-center justify-center text-white mr-4 mt-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></div>` 
                    : '';

                const contentHTML = role === 'user' ? escapeHTML(content) : marked.parse(content || '...');

                msgDiv.innerHTML = `
                    <div class="flex max-w-3xl w-full ${role === 'user' ? 'justify-end' : 'justify-start'}">
                        ${avatar}
                        <div class="${innerClass} content-box">${contentHTML}</div>
                    </div>
                `;
                
                els.messagesList.appendChild(msgDiv);
                return msgDiv.querySelector('.content-box');
            }

            function scrollToBottom() {
                els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
            }

            // --- API Integration (Streaming) ---
            async function sendMessage(e) {
                e.preventDefault();
                const text = els.messageInput.value.trim();
                if (!text || isGenerating) return;

                if (!settings.apiKey) {
                    alert('Please set your OpenRouter API Key in settings.');
                    openSettings();
                    return;
                }

                // UI Updates
                els.messageInput.value = '';
                els.messageInput.style.height = '56px';
                els.sendBtn.disabled = true;
                els.emptyState.style.display = 'none';
                
                const chat = chats.find(c => c.id === currentChatId);
                
                // Set title if first message
                if (chat.messages.length === 0) {
                    chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                    renderChatList();
                    els.mobileChatTitle.textContent = chat.title;
                }

                // Add User Message
                chat.messages.push({ role: 'user', content: text });
                appendMessageUI('user', text);
                saveChats();
                scrollToBottom();

                isGenerating = true;
                abortController = new AbortController();

                // Prep API payload
                const apiMessages = [
                    { role: 'system', content: settings.systemPrompt },
                    ...chat.messages.map(m => ({ role: m.role, content: m.content }))
                ];

                // Create AI message placeholder
                chat.messages.push({ role: 'assistant', content: '' });
                const aiMessageContentBox = appendMessageUI('assistant', '');
                let aiResponseText = '';

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${settings.apiKey}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'Arup AI Client'
                        },
                        body: JSON.stringify({
                            model: settings.model,
                            messages: apiMessages,
                            stream: true
                        }),
                        signal: abortController.signal
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`API Error: ${response.status} - ${errText}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let done = false;

                    while (!done) {
                        const { value, done: readerDone } = await reader.read();
                        done = readerDone;
                        if (value) {
                            const chunk = decoder.decode(value, { stream: true });
                            const lines = chunk.split('\n');
                            
                            for (const line of lines) {
                                if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                                    try {
                                        const data = JSON.parse(line.slice(6));
                                        const delta = data.choices[0]?.delta?.content || '';
                                        aiResponseText += delta;
                                        // Update UI
                                        aiMessageContentBox.innerHTML = marked.parse(aiResponseText);
                                        scrollToBottom();
                                    } catch (e) {
                                        console.error('Error parsing stream chunk', e, line);
                                    }
                                }
                            }
                        }
                    }
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        aiResponseText = `*Error:* ${error.message}`;
                        aiMessageContentBox.innerHTML = marked.parse(aiResponseText);
                    }
                } finally {
                    isGenerating = false;
                    chat.messages[chat.messages.length - 1].content = aiResponseText;
                    saveChats();
                    checkInputState();
                }
            }

            // --- Event Listeners ---
            function setupEventListeners() {
                // Sidebar Mobile Toggles
                els.openSidebarBtn.addEventListener('click', () => {
                    els.sidebar.classList.remove('-translate-x-full');
                    els.sidebarOverlay.classList.remove('hidden');
                });

                function closeSidebarMobile() {
                    if (window.innerWidth < 1024) { // lg breakpoint
                        els.sidebar.classList.add('-translate-x-full');
                        els.sidebarOverlay.classList.add('hidden');
                    }
                }
                els.closeSidebarBtn.addEventListener('click', closeSidebarMobile);
                els.sidebarOverlay.addEventListener('click', closeSidebarMobile);

                // Top Level Actions
                els.newChatBtn.addEventListener('click', createNewChat);
                els.themeToggle.addEventListener('click', toggleTheme);
                
                // Settings
                els.settingsBtn.addEventListener('click', openSettings);
                els.closeSettingsBtn.addEventListener('click', closeSettings);
                els.cancelSettingsBtn.addEventListener('click', closeSettings);
                els.saveSettingsBtn.addEventListener('click', () => {
                    settings.apiKey = els.apiKeyInput.value.trim();
                    settings.model = els.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
                    settings.systemPrompt = els.systemPromptInput.value.trim() || 'You are Arup AI, a helpful assistant.';
                    saveSettings();
                    closeSettings();
                });

                // Input Auto-resize & Submit handling
                els.messageInput.addEventListener('input', () => {
                    els.messageInput.style.height = '56px'; // Reset to min-height
                    els.messageInput.style.height = Math.min(els.messageInput.scrollHeight, 192) + 'px'; // Max 48px * 4 lines approx
                    checkInputState();
                });

                els.messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (!els.sendBtn.disabled) {
                            els.chatForm.dispatchEvent(new Event('submit'));
                        }
                    }
                });

                els.chatForm.addEventListener('submit', sendMessage);
            }

            // --- Helpers ---
            function openSettings() {
                els.apiKeyInput.value = settings.apiKey;
                els.modelInput.value = settings.model;
                els.systemPromptInput.value = settings.systemPrompt;
                els.settingsModal.classList.remove('hidden');
            }

            function closeSettings() {
                els.settingsModal.classList.add('hidden');
            }

            function checkInputState() {
                els.sendBtn.disabled = els.messageInput.value.trim() === '' || isGenerating;
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag]));
            }

            // Kickoff
            init();
        });
    </script>
</body>
</html>
