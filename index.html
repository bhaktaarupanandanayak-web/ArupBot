<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arup AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: { light: '#f0f4f9', dark: '#131314', userLight: '#e3e3e3', userDark: '#1e1f20' }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Base styles & safe areas for mobile */
        body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        
        /* Loading Screen */
        #loading {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #ffffff;
            color: #1f2937; z-index: 9999; font-family: sans-serif;
        }
        .dark #loading { background: #131314; color: #f3f4f6; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1);
            border-left-color: #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 1rem;
        }
        .dark .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #60a5fa; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Markdown Prose Styling */
        .prose p { margin-bottom: 0.75em; }
        .prose p:last-child { margin-bottom: 0; }
        .prose pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; font-size: 0.875rem; }
        .prose code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background: rgba(150,150,150,0.2); padding: 0.15rem 0.3rem; border-radius: 0.25rem; font-size: 0.875em;}
        .prose pre code { background: transparent; padding: 0; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .prose a { color: #3b82f6; text-decoration: underline; }
        
        /* Blinking Cursor for Streaming */
        .cursor-blink::after { content: '▋'; animation: blink 1s step-start infinite; color: #3b82f6; margin-left: 2px;}
        @keyframes blink { 50% { opacity: 0; } }

        /* Sidebar transition */
        .sidebar-slide { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-white dark:bg-gemini-dark text-gray-800 dark:text-gray-100 min-h-[100dvh] flex m-0 p-0 antialiased">

    <div id="loading">
        <div class="spinner"></div>
        <div class="text-xl font-semibold tracking-wide">Arup AI</div>
    </div>

    <div id="app" class="hidden w-full flex min-h-[100dvh] relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="sidebar-slide fixed md:sticky top-0 left-0 h-[100dvh] w-72 bg-gemini-light dark:bg-[#1e1f20] flex flex-col z-50 transform -translate-x-full md:translate-x-0 border-r border-gray-200 dark:border-gray-800 shrink-0">
            <div class="p-4 flex items-center justify-between">
                <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="px-4 pb-4">
                <button onclick="createNewChat()" class="w-full flex items-center gap-2 bg-white dark:bg-[#131314] hover:bg-gray-50 dark:hover:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full py-3 px-4 shadow-sm transition-colors text-sm font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New chat
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3 py-2" id="chat-history-list">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <button onclick="openSettings()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 min-h-[100dvh] relative">
            
            <header class="sticky top-0 z-30 bg-white/80 dark:bg-gemini-dark/80 backdrop-blur-md px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="text-xl font-medium tracking-tight">Arup AI</h1>
                </div>
                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle Dark Mode">
                    <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
                </button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-6 md:px-8 max-w-4xl w-full mx-auto space-y-6">
                </div>

            <div class="sticky bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-dark dark:via-gemini-dark pt-6 pb-4 px-4 md:px-8 z-30">
                <div class="max-w-4xl mx-auto relative">
                    <form id="chat-form" class="relative flex items-end bg-gemini-light dark:bg-gemini-userDark rounded-3xl border border-gray-200 dark:border-gray-700 focus-within:ring-1 focus-within:ring-blue-500 overflow-hidden px-2 pb-2 pt-2 shadow-sm">
                        <textarea id="message-input" rows="1" class="w-full max-h-48 bg-transparent text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 border-0 focus:ring-0 resize-none py-3 px-4 m-0 text-base" placeholder="Ask Arup AI anything..."></textarea>
                        <button type="submit" id="send-btn" class="mb-1 mr-1 p-3 rounded-full bg-blue-600 hover:bg-blue-700 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0" disabled>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </form>
                    <div class="text-center mt-2 text-xs text-gray-500 dark:text-gray-400">
                        AI can make mistakes. Consider verifying important information.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#1e1f20] rounded-2xl w-full max-w-md shadow-2xl overflow-hidden transform transition-all border border-gray-200 dark:border-gray-700">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
                <h2 class="text-lg font-semibold">Settings</h2>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="setting-api-key" placeholder="sk-or-v1-..." class="w-full bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model</label>
                    <input type="text" id="setting-model" placeholder="deepseek/deepseek-r1:free" class="w-full bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt (Optional)</label>
                    <textarea id="setting-system" rows="3" placeholder="You are Arup AI, a helpful assistant..." class="w-full bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 dark:bg-[#131314] border-t border-gray-200 dark:border-gray-800 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = {
            chats: [],
            currentChatId: null,
            settings: {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are Arup AI, a highly intelligent and helpful assistant.',
                theme: 'dark' // Default to dark for Gemini vibe
            },
            isGenerating: false
        };

        // --- Initialization ---
        document.addEventListener("DOMContentLoaded", () => {
            try {
                loadState();
                applyTheme();
                renderSidebar();
                renderCurrentChat();
                setupTextareaAutoResize();
                setupFormSubmit();
                
                // Hide loader, show app
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
            } catch (error) {
                console.error("Initialization failed:", error);
                document.getElementById('loading').innerHTML = `<div class="text-red-500 p-4 text-center">Failed to load app.<br>${error.message}</div>`;
            }
        });

        // --- Core Functions ---
        function loadState() {
            const savedSettings = localStorage.getItem('arup_settings');
            if (savedSettings) state.settings = { ...state.settings, ...JSON.parse(savedSettings) };
            
            const savedChats = localStorage.getItem('arup_chats');
            if (savedChats) state.chats = JSON.parse(savedChats);
            
            const savedCurrentChatId = localStorage.getItem('arup_currentChatId');
            if (savedCurrentChatId && state.chats.some(c => c.id === savedCurrentChatId)) {
                state.currentChatId = savedCurrentChatId;
            } else if (state.chats.length > 0) {
                state.currentChatId = state.chats[0].id;
            } else {
                createNewChat(false); // don't render yet
            }
        }

        function saveState() {
            localStorage.setItem('arup_settings', JSON.stringify(state.settings));
            localStorage.setItem('arup_chats', JSON.stringify(state.chats));
            localStorage.setItem('arup_currentChatId', state.currentChatId);
        }

        function createNewChat(render = true) {
            if (state.isGenerating) return;
            const newChat = {
                id: 'chat_' + Date.now(),
                title: 'New Chat',
                messages: [],
                createdAt: Date.now()
            };
            state.chats.unshift(newChat);
            state.currentChatId = newChat.id;
            saveState();
            if (render) {
                renderSidebar();
                renderCurrentChat();
                if (window.innerWidth < 768) toggleSidebar(); // Auto-close on mobile
            }
        }

        function selectChat(id) {
            if (state.isGenerating) return;
            state.currentChatId = id;
            saveState();
            renderSidebar();
            renderCurrentChat();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if (state.isGenerating) return;
            if (!confirm('Delete this chat?')) return;
            
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) {
                state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
                if (!state.currentChatId) createNewChat(false);
            }
            saveState();
            renderSidebar();
            renderCurrentChat();
        }

        // --- UI Rendering ---
        function renderSidebar() {
            const list = document.getElementById('chat-history-list');
            if (!list) return;
            list.innerHTML = '';
            
            state.chats.forEach(chat => {
                const isActive = chat.id === state.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-3 rounded-xl mb-1 cursor-pointer transition-colors text-sm ${isActive ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-medium' : 'hover:bg-gray-200 dark:hover:bg-gray-800'}`;
                div.onclick = () => selectChat(chat.id);
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'truncate pr-2 flex-1';
                titleSpan.textContent = chat.title || 'New Chat';
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = `opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-gray-300 dark:hover:bg-gray-700 transition-opacity ${isActive ? 'opacity-100' : ''}`;
                deleteBtn.innerHTML = '<svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>';
                deleteBtn.onclick = (e) => deleteChat(chat.id, e);

                div.appendChild(titleSpan);
                div.appendChild(deleteBtn);
                list.appendChild(div);
            });
        }

        function renderCurrentChat() {
            const container = document.getElementById('chat-container');
            if (!container) return;
            container.innerHTML = '';

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            
            if (!currentChat || currentChat.messages.length === 0) {
                // Empty State
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center opacity-70 mt-20">
                        <div class="w-16 h-16 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-full flex items-center justify-center mb-6 shadow-lg">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <h2 class="text-3xl font-semibold mb-2">Hello, I'm Arup AI</h2>
                        <p class="text-gray-500 dark:text-gray-400 max-w-md">How can I help you today? I can write code, answer questions, and assist with formatting.</p>
                    </div>
                `;
                return;
            }

            currentChat.messages.forEach(msg => {
                appendMessageToUI(msg.role, msg.content);
            });
            scrollToBottom();
        }

        function appendMessageToUI(role, content, isStreaming = false) {
            const container = document.getElementById('chat-container');
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const bubble = document.createElement('div');
            
            if (role === 'user') {
                bubble.className = 'max-w-[85%] md:max-w-[75%] rounded-3xl px-5 py-3.5 bg-gemini-userLight dark:bg-gemini-userDark text-gray-900 dark:text-gray-100 whitespace-pre-wrap';
                bubble.textContent = content;
            } else {
                bubble.className = `max-w-[100%] md:max-w-[85%] rounded-3xl px-5 py-3.5 bg-transparent text-gray-900 dark:text-gray-100 prose prose-slate dark:prose-invert ${isStreaming ? 'cursor-blink' : ''}`;
                // Render markdown safely
                bubble.innerHTML = marked.parse(content || ' ');
            }

            // Remove previous streaming blinker if it exists
            if (!isStreaming) {
                 const blinking = container.querySelector('.cursor-blink');
                 if(blinking) blinking.classList.remove('cursor-blink');
            }

            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
            if(isStreaming) wrapper.id = 'active-stream';
            return wrapper;
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        // --- Interaction Logic ---
        function setupTextareaAutoResize() {
            const textarea = document.getElementById('message-input');
            const btn = document.getElementById('send-btn');
            
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 192) + 'px'; // Max 12rem (48 * 4px)
                btn.disabled = this.value.trim().length === 0 || state.isGenerating;
            });

            textarea.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!btn.disabled) document.getElementById('chat-form').dispatchEvent(new Event('submit'));
                }
            });
        }

        function setupFormSubmit() {
            document.getElementById('chat-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (state.isGenerating) return;

                const input = document.getElementById('message-input');
                const content = input.value.trim();
                if (!content) return;

                if (!state.settings.apiKey) {
                    openSettings();
                    alert("Please configure your OpenRouter API Key first.");
                    return;
                }

                // Prepare UI
                input.value = '';
                input.style.height = 'auto';
                document.getElementById('send-btn').disabled = true;
                
                const chat = state.chats.find(c => c.id === state.currentChatId);
                
                // Set title if first message
                if (chat.messages.length === 0) {
                    chat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
                    renderSidebar();
                }

                // Add User Message
                chat.messages.push({ role: 'user', content });
                appendMessageToUI('user', content);
                scrollToBottom();
                saveState();

                // Start AI Response
                state.isGenerating = true;
                const streamWrapper = appendMessageToUI('assistant', '', true);
                const streamBubble = streamWrapper.firstChild;
                scrollToBottom();

                // Prepare API payload
                let apiMessages = [];
                if (state.settings.systemPrompt) {
                    apiMessages.push({ role: 'system', content: state.settings.systemPrompt });
                }
                // Keep context limited to avoid token bloat on free APIs (last 10 msgs)
                const contextMessages = chat.messages.slice(-10); 
                apiMessages = apiMessages.concat(contextMessages);

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${state.settings.apiKey}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'Arup AI Chat'
                        },
                        body: JSON.stringify({
                            model: state.settings.model || 'deepseek/deepseek-r1:free',
                            messages: apiMessages,
                            stream: true
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || `HTTP ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let assistantResponse = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n').filter(line => line.trim() !== '');

                        for (const line of lines) {
                            if (line === 'data: [DONE]') break;
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.substring(6));
                                    const delta = data.choices[0]?.delta?.content || '';
                                    assistantResponse += delta;
                                    
                                    // Update UI
                                    streamBubble.innerHTML = marked.parse(assistantResponse);
                                    scrollToBottom();
                                } catch (e) {
                                    // Ignore parse errors on partial streams
                                }
                            }
                        }
                    }

                    // Finalize
                    streamBubble.classList.remove('cursor-blink');
                    streamWrapper.removeAttribute('id');
                    chat.messages.push({ role: 'assistant', content: assistantResponse });
                    
                } catch (error) {
                    streamBubble.classList.remove('cursor-blink');
                    streamBubble.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
                    chat.messages.push({ role: 'assistant', content: `Error: ${error.message}` });
                } finally {
                    state.isGenerating = false;
                    document.getElementById('send-btn').disabled = false;
                    saveState();
                    // Refocus input if desktop
                    if(window.innerWidth >= 768) input.focus();
                }
            });
        }

        // --- Settings Modal ---
        function openSettings() {
            document.getElementById('setting-api-key').value = state.settings.apiKey;
            document.getElementById('setting-model').value = state.settings.model;
            document.getElementById('setting-system').value = state.settings.systemPrompt;
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function saveSettings() {
            state.settings.apiKey = document.getElementById('setting-api-key').value.trim();
            const model = document.getElementById('setting-model').value.trim();
            state.settings.model = model ? model : 'deepseek/deepseek-r1:free';
            state.settings.systemPrompt = document.getElementById('setting-system').value.trim();
            saveState();
            closeSettings();
        }

        // --- UI Toggles ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function applyTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (state.settings.theme === 'dark') {
                html.classList.add('dark');
                // Moon icon
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            } else {
                html.classList.remove('dark');
                // Sun icon
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            }
        }

        function toggleTheme() {
            state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
            saveState();
            applyTheme();
        }
    </script>
</body>
